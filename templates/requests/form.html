<!-- Форма заявки -->
{% extends "base.html" %}

{% block title %}{{ form_title }}{% endblock %}
{% block page_title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="card custom-card">
    <div class="card-header custom-card-header">
        <h5 class="mb-0">{{ form_title }}</h5>
    </div>

    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label">Инициатор</label>
                <input
                    type="text"
                    name="initiator"
                    class="form-control"
                    required
                    value="{{ request_item.initiator if request_item else current_user.full_name }}"
                >
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Подразделение</label>
                <select name="department" class="form-select" required>
                    {% set departments = ["Склад", "Производственный цех", "Отдел эксплуатации", "Энергетическая служба", "Ремонтный участок"] %}
                    {% for department in departments %}
                    <option
                        value="{{ department }}"
                        {% if request_item and request_item.department == department %}selected{% endif %}
                    >
                        {{ department }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Материал</label>
                <select name="material_id" class="form-select" required>
                    {% for material in materials %}
                    <option
                        value="{{ material.id }}"
                        {% if request_item and request_item.material_id == material.id %}selected{% endif %}
                    >
                        {{ material.name }} — остаток: {{ material.current_stock }} {{ material.unit }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label">Количество</label>
                <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    name="quantity"
                    class="form-control"
                    required
                    value="{{ request_item.quantity if request_item else '' }}"
                >
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label">Приоритет</label>
                <select name="priority" class="form-select" required>
                    {% for priority in ["Низкий", "Средний", "Высокий"] %}
                    <option
                        value="{{ priority }}"
                        {% if request_item and request_item.priority == priority %}selected{% endif %}
                    >
                        {{ priority }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Статус</label>
                <select name="status" class="form-select" required>
                    {% for status in statuses %}
                    <option
                        value="{{ status }}"
                        {% if request_item and request_item.status == status %}selected{% endif %}
                    >
                        {{ status }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Комментарий</label>
                <textarea
                    name="comment"
                    class="form-control"
                    rows="4"
                    placeholder="Введите комментарий к заявке"
                >{{ request_item.comment if request_item else '' }}</textarea>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-save"></i> Сохранить
                </button>

                <a href="{{ url_for('requests_list') }}" class="btn btn-outline-secondary">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
