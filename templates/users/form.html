<!-- Форма пользователя -->
{% extends "base.html" %}

{% block title %}{{ form_title }}{% endblock %}
{% block page_title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="card custom-card">
    <div class="card-header custom-card-header">
        <h5 class="mb-0">{{ form_title }}</h5>
    </div>

    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label">ФИО</label>
                <input
                    type="text"
                    name="full_name"
                    class="form-control"
                    required
                    value="{{ form_data.get('full_name', user.full_name if user else '') }}"
                    placeholder="Введите ФИО пользователя"
                >
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Логин</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                    value="{{ form_data.get('username', user.username if user else '') }}"
                    placeholder="Например: ivanov"
                >
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                    value="{{ form_data.get('email', user.email if user else '') }}"
                    placeholder="user@enterprise.ru"
                >
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Пароль</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    {% if not is_edit %}required{% endif %}
                    minlength="4"
                    placeholder="{% if is_edit %}Оставьте пустым, чтобы не менять{% else %}Введите пароль{% endif %}"
                >
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label">Роль</label>
                <select name="role" class="form-select" required>
                    {% for role in roles %}
                    <option
                        value="{{ role }}"
                        {% if form_data.get('role', user.role if user else '') == role %}selected{% endif %}
                    >
                        {{ role }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-6 d-flex align-items-end">
                <div class="form-check form-switch mb-2">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        role="switch"
                        id="is_active"
                        name="is_active"
                        {% if form_data.get('is_active') == 'on' or (not form_data and (not user or user.is_active)) %}checked{% endif %}
                    >
                    <label class="form-check-label" for="is_active">Активен</label>
                </div>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-save"></i> Сохранить
                </button>

                <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
