<!-- Страница 404 -->
{% extends "base.html" %}

{% block title %}Страница не найдена{% endblock %}
{% block page_title %}Ошибка 404{% endblock %}

{% block content %}
<div class="card custom-card text-center py-5">
    <div class="card-body">
        <h1 class="display-4 fw-bold">404</h1>
        <p class="lead">Запрашиваемая страница не найдена.</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-danger">
            Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}
